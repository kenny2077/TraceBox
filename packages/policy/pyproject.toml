[project]
name = "tracegate"
version = "0.1.0"
description = "Runtime firewall and stdio proxy for AI agents using MCP."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Kenny"}
]
keywords = ["mcp", "security", "firewall", "ai-agent", "proxy", "policy", "dlp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "typer>=0.12.0",
    "rich>=13.0.0",
    "pyyaml>=6.0.0",
    "pydantic>=2.0.0",
]

[project.scripts]
tracegate = "tracegate.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff"
]
dashboard = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "jinja2>=3.1.2",
    "httpx>=0.28.1",
    "sse-starlette>=2.0.0"
]

[project.urls]
Homepage = "https://github.com/kenny2077/TraceGate"
Repository = "https://github.com/kenny2077/TraceGate"
Issues = "https://github.com/kenny2077/TraceGate/issues"
